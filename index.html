<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>EuroScope Zenith Dashboard</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #111827;
            /* Zinc-900 */
            --card-bg: #1f2937;
            /* Zinc-800 */
            --accent-emerald: #10b981;
            /* Emerald-500 */
            --accent-emerald-dim: rgba(16, 185, 129, 0.1);
            --text-main: #e5e7eb;
            /* Zinc-200 */
            --text-dim: #9ca3af;
            /* Zinc-400 */
            --border-color: #374151;
            /* Zinc-700 */
            --up-color: #10b981;
            --down-color: #ef4444;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            overflow-x: hidden;
            padding: 16px;
        }

        .container {
            max-width: 500px;
            margin: 0 auto;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }

        .logo {
            font-weight: 700;
            font-size: 1rem;
            letter-spacing: 2px;
            color: var(--accent-emerald);
            font-family: 'Fira Code', monospace;
        }

        .status-badge {
            background: var(--accent-emerald-dim);
            color: var(--accent-emerald);
            padding: 4px 12px;
            border-radius: 6px;
            font-size: 0.7rem;
            font-weight: 600;
            border: 1px solid rgba(16, 185, 129, 0.2);
            text-transform: uppercase;
        }

        .price-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 32px 24px;
            margin-bottom: 16px;
            text-align: center;
        }

        .price-label {
            color: var(--text-dim);
            font-size: 0.75rem;
            margin-bottom: 12px;
            letter-spacing: 1.5px;
            text-transform: uppercase;
        }

        .price-value {
            font-size: 2.8rem;
            font-weight: 700;
            margin-bottom: 8px;
            font-family: 'Fira Code', monospace;
            color: var(--text-main);
        }

        .price-change {
            font-size: 0.95rem;
            font-weight: 500;
            font-family: 'Fira Code', monospace;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 16px;
        }

        .stat-card {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 16px;
            border: 1px solid var(--border-color);
        }

        .stat-label {
            color: var(--text-dim);
            font-size: 0.7rem;
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .stat-value {
            font-weight: 600;
            font-size: 1.1rem;
            font-family: 'Fira Code', monospace;
        }

        .chart-placeholder {
            background: var(--bg-color);
            border-radius: 12px;
            height: 180px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 24px;
            border: 1px dashed var(--border-color);
            position: relative;
        }

        .action-button {
            background: var(--accent-emerald);
            color: #064e3b;
            /* emerald-900 for high contrast */
            border: none;
            width: 100%;
            padding: 18px;
            border-radius: 8px;
            font-weight: 700;
            font-size: 0.95rem;
            margin-bottom: 12px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .secondary-button {
            background: transparent;
            color: var(--text-dim);
            border: 1px solid var(--border-color);
            width: 100%;
            padding: 14px;
            border-radius: 8px;
            font-weight: 600;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .secondary-button:hover {
            border-color: var(--accent-emerald);
            color: var(--text-main);
        }
    </style>
</head>

<body>
    <div class="container">
        <header>
            <div class="logo">EUROSCOPE</div>
            <div class="status-badge">● LIVE</div>
        </header>

        <div class="price-card">
            <div class="price-label">EUR/USD PRO PRICE</div>
            <div class="price-value" id="price">1.08456</div>
            <div class="price-change" id="change" style="color: var(--up-color);">+0.00245 (+0.23%)</div>
        </div>

        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-label">DAILY RANGE</div>
                <div class="stat-value">64.2 pips</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">SENTIMENT</div>
                <div class="stat-value" style="color: var(--up-color);">BULLISH</div>
            </div>
        </div>

        <div class="chart-placeholder">
            <span style="color: var(--text-dim); font-size: 0.8rem; z-index: 1;">LOADING REAL-TIME ANALYTICS...</span>
        </div>

        <button class="action-button" onclick="Telegram.WebApp.close()">CLOSE TERMINAL</button>
        <button class="secondary-button" onclick="refresh()">REFRESH DATA</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.enableClosingConfirmation();

        function refresh() {
            tg.HapticFeedback.impactOccurred('medium');
            // Mock refresh animation
            const priceEl = document.getElementById('price');
            priceEl.style.opacity = '0.5';
            setTimeout(() => {
                priceEl.style.opacity = '1';
                priceEl.innerText = (1.08 + Math.random() * 0.01).toFixed(5);
            }, 300);
        }

        // Apply theme colors
        document.documentElement.style.setProperty('--bg-color', tg.themeParams.bg_color || '#0B0E11');
    </script>
</body>

</html>
