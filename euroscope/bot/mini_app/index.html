<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Zenith Terminal</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Fira+Code:wght@400;600&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg-color: #0b0f19;
            --card-bg: rgba(17, 24, 39, 0.7);
            --accent-emerald: #10b981;
            --accent-emerald-dim: rgba(16, 185, 129, 0.1);
            --text-main: #f3f4f6;
            --text-dim: #9ca3af;
            --border-color: rgba(31, 41, 55, 0.6);
            --up-color: #10b981;
            --down-color: #ef4444;
            --glass-blur: blur(20px);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            background-image:
                radial-gradient(circle at 50% -20%, rgba(16, 185, 129, 0.1), transparent 80%),
                radial-gradient(circle at 0% 100%, rgba(17, 24, 39, 1), transparent 50%);
            color: var(--text-main);
            overflow-x: hidden;
            padding: 16px;
            min-height: 100vh;
        }

        .container {
            max-width: 500px;
            margin: 0 auto;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }

        .logo {
            font-weight: 700;
            font-size: 0.8rem;
            letter-spacing: 3px;
            color: var(--accent-emerald);
            font-family: 'Fira Code', monospace;
        }

        .status-badge {
            background: var(--accent-emerald-dim);
            color: var(--accent-emerald);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.6rem;
            font-weight: 700;
            border: 1px solid rgba(16, 185, 129, 0.2);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Navigation Tabs */
        .nav-tabs {
            display: flex;
            background: var(--card-bg);
            backdrop-filter: var(--glass-blur);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            margin-bottom: 20px;
            padding: 4px;
        }

        .tab-btn {
            flex: 1;
            padding: 10px 2px;
            border: none;
            background: transparent;
            color: var(--text-dim);
            font-size: 0.6rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            transition: 0.2s ease;
            border-radius: 8px;
        }

        .tab-btn.active {
            color: var(--accent-emerald);
            background: rgba(16, 185, 129, 0.1);
        }

        .tab-content {
            display: none;
            animation: fadeIn 0.3s ease-out;
        }

        .tab-content.active {
            display: block;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(4px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .glass-card {
            background: var(--card-bg);
            backdrop-filter: var(--glass-blur);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            margin-bottom: 16px;
        }

        .price-card {
            padding: 32px 20px;
            text-align: center;
        }

        .price-label {
            color: var(--text-dim);
            font-size: 0.6rem;
            margin-bottom: 12px;
            letter-spacing: 2.5px;
            text-transform: uppercase;
            font-weight: 600;
        }

        .price-value {
            font-size: 3.4rem;
            font-weight: 700;
            margin-bottom: 4px;
            font-family: 'Fira Code', monospace;
            letter-spacing: -2px;
        }

        .price-change {
            font-size: 0.95rem;
            font-weight: 600;
            font-family: 'Fira Code', monospace;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 16px;
        }

        .stat-card {
            padding: 16px;
        }

        .stat-label {
            color: var(--text-dim);
            font-size: 0.55rem;
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            font-weight: 600;
        }

        .stat-value {
            font-weight: 700;
            font-size: 0.9rem;
            font-family: 'Fira Code', monospace;
        }

        #chart-container {
            width: 100%;
            height: 240px;
            margin-bottom: 16px;
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid var(--border-color);
            background: #0b0f19;
        }

        .card-inner {
            padding: 20px;
        }

        /* Analysis List */
        .ta-row {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            font-size: 0.75rem;
        }

        .ta-row:last-child {
            border-bottom: none;
        }

        .ta-label {
            color: var(--text-dim);
            font-weight: 500;
        }

        .ta-value {
            font-family: 'Fira Code', monospace;
            font-weight: 600;
            color: var(--text-main);
        }

        .action-button {
            background: var(--accent-emerald);
            color: #064e3b;
            border: none;
            width: 100%;
            padding: 18px;
            border-radius: 16px;
            font-weight: 700;
            font-size: 0.85rem;
            margin-top: 8px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 2px;
            box-shadow: 0 4px 20px rgba(16, 185, 129, 0.2);
        }

        .secondary-button {
            background: transparent;
            color: var(--text-dim);
            border: 1px solid var(--border-color);
            width: 100%;
            padding: 14px;
            border-radius: 16px;
            font-weight: 600;
            font-size: 0.75rem;
            margin-top: 12px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .empty-state {
            text-align: center;
            color: var(--text-dim);
            padding: 50px 20px;
            font-size: 0.75rem;
            letter-spacing: 1px;
            font-weight: 500;
        }
    </style>
</head>

<body>
    <div class="container">
        <header>
            <div class="logo">EURO/SC_ZENITH</div>
            <div class="status-badge" id="api-status">CONNECTING</div>
        </header>

        <nav class="nav-tabs">
            <button class="tab-btn active" id="btn-live" onclick="showTab('live')">Terminal</button>
            <button class="tab-btn" id="btn-signals" onclick="showTab('signals')">Signals</button>
            <button class="tab-btn" id="btn-analysis" onclick="showTab('analysis')">Analysis</button>
            <button class="tab-btn" id="btn-alerts" onclick="showTab('alerts')">Alerts</button>
        </nav>

        <div id="live" class="tab-content active">
            <div class="glass-card price-card">
                <div class="price-label">EUR/USD PRO QUOTE</div>
                <div class="price-value" id="price">-.-----</div>
                <div class="price-change" id="change">--.--- (---%)</div>
            </div>

            <div class="stats-grid">
                <div class="glass-card stat-card">
                    <div class="stat-label">Daily Reach</div>
                    <div class="stat-value" id="range">--- pips</div>
                </div>
                <div class="glass-card stat-card">
                    <div class="stat-label">Hi/Lo Range</div>
                    <div class="stat-value" id="hilo" style="font-size: 0.75rem;">-.--- / -.---</div>
                </div>
            </div>

            <div id="chart-container"></div>
        </div>

        <div id="signals" class="tab-content">
            <div id="signal-list">
                <div class="empty-state">SYNCING SIGNALS...</div>
            </div>
        </div>

        <div id="analysis" class="tab-content">
            <div class="glass-card">
                <div class="card-inner" id="analysis-content"></div>
            </div>
        </div>

        <div id="alerts" class="tab-content">
            <div id="alert-list">
                <div class="empty-state">FETCHING ALERTS...</div>
            </div>
        </div>

        <button class="action-button" onclick="refreshData()">REFRESH SYSTEM</button>
        <button class="secondary-button" onclick="Telegram.WebApp.close()">DISCONNECT</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.headerColor = '#0b0f19';
        tg.backgroundColor = '#0b0f19';

        const API_BASE = "/api";
        let chart, candleSeries;

        function initChart() {
            const container = document.getElementById('chart-container');
            chart = LightweightCharts.createChart(container, {
                layout: {
                    background: { type: 'solid', color: '#0b0f19' },
                    textColor: '#9ca3af',
                    fontSize: 10,
                },
                grid: {
                    vertLines: { color: 'rgba(31, 41, 55, 0.3)' },
                    horzLines: { color: 'rgba(31, 41, 55, 0.3)' },
                },
                rightPriceScale: { borderColor: 'rgba(31, 41, 55, 0.5)', scaleMargins: { top: 0.2, bottom: 0.2 } },
                timeScale: { borderColor: 'rgba(31, 41, 55, 0.5)', timeVisible: true },
            });
            candleSeries = chart.addCandlestickSeries({
                upColor: '#10b981',
                downColor: '#ef4444',
                borderVisible: false,
                wickUpColor: '#10b981',
                wickDownColor: '#ef4444',
            });

            new ResizeObserver(() => {
                chart.applyOptions({ width: container.clientWidth, height: container.clientHeight });
            }).observe(container);
        }

        async function fetchAPI(endpoint) {
            try {
                const response = await fetch(`${API_BASE}${endpoint}`);
                if (!response.ok) return { success: false };
                return await response.json();
            } catch (e) { return { success: false }; }
        }

        function showTab(id) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.getElementById('btn-' + id).classList.add('active');
            tg.HapticFeedback.impactOccurred('light');
            refreshData();
        }

        async function refreshData() {
            const activeTab = document.querySelector('.tab-content.active').id;
            const status = document.getElementById('api-status');

            if (activeTab === 'live') {
                const [summary, candles] = await Promise.all([fetchAPI('/summary'), fetchAPI('/candles?timeframe=H1')]);
                if (summary.success) {
                    document.getElementById('price').textContent = (summary.price || 0).toFixed(5);
                    const chg = summary.change || 0;
                    const sign = chg >= 0 ? '+' : '';
                    const changeEl = document.getElementById('change');
                    changeEl.textContent = `${sign}${chg.toFixed(5)} (${sign}${(summary.change_pct || 0).toFixed(2)}%)`;
                    changeEl.style.color = chg >= 0 ? 'var(--up-color)' : 'var(--down-color)';

                    document.getElementById('range').textContent = `${(summary.range_pips || 0).toFixed(1)} pips`;
                    document.getElementById('hilo').textContent = `${(summary.high || 0).toFixed(5)} / ${(summary.low || 0).toFixed(5)}`;

                    status.textContent = "● LIVE";
                    status.style.color = "var(--up-color)";
                }
                if (candles.success && candles.candles?.length > 0) {
                    candleSeries.setData(candles.candles);
                    chart.timeScale().fitContent();
                }
            } else if (activeTab === 'analysis') {
                const data = await fetchAPI('/analysis');
                const content = document.getElementById('analysis-content');
                if (data.success && data.data) {
                    const ta = data.data;
                    const ind = ta.indicators || {};
                    content.innerHTML = `
                        <p style="font-size: 0.6rem; font-weight: 700; color: var(--accent-emerald); margin-bottom: 12px; letter-spacing: 2px;">NEURAL ARCHITECTURE (H1)</p>
                        <div class="ta-row"><span class="ta-label">Market Bias</span><span class="ta-value">${ta.overall_bias || 'NEUTRAL'}</span></div>
                        <div class="ta-row"><span class="ta-label">RSI (14)</span><span class="ta-value">${ind.RSI?.value?.toFixed(1) || 'N/A'}</span></div>
                        <div class="ta-row"><span class="ta-label">EMA 50</span><span class="ta-value">${ind.EMA?.ema50?.toFixed(5) || 'N/A'}</span></div>
                        <div class="ta-row"><span class="ta-label">EMA 200</span><span class="ta-value">${ind.EMA?.ema200?.toFixed(5) || 'N/A'}</span></div>
                        <div class="ta-row"><span class="ta-label">ATR Volatility</span><span class="ta-value">${ind.ATR?.pips?.toFixed(1) || '0.0'} pips</span></div>
                    `;
                }
            }
        }

        window.onload = () => { initChart(); refreshData(); };
        setInterval(() => { if (document.querySelector('.tab-content.active').id === 'live') refreshData(); }, 30000);
    </script>
</body>

</html>
