<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>EuroScope Zenith Dashboard</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Fira+Code:wght@400;600&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg-color: #0b0f19;
            /* Zinc-950 */
            --card-bg: rgba(17, 24, 39, 0.8);
            /* Zinc-900 with glass opacity */
            --accent-emerald: #10b981;
            /* Emerald-500 */
            --accent-emerald-dim: rgba(16, 185, 129, 0.1);
            --text-main: #f3f4f6;
            /* Zinc-100 */
            --text-dim: #9ca3af;
            /* Zinc-400 */
            --border-color: rgba(31, 41, 55, 0.5);
            /* Zinc-800 glassy */
            --up-color: #10b981;
            --down-color: #ef4444;
            --glass-blur: blur(16px);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            background-image:
                radial-gradient(circle at top right, rgba(16, 185, 129, 0.08), transparent 400px),
                radial-gradient(circle at bottom left, rgba(17, 24, 39, 1), transparent 600px);
            color: var(--text-main);
            overflow-x: hidden;
            padding: 16px;
            padding-bottom: 20px;
            min-height: 100vh;
        }

        .container {
            max-width: 500px;
            margin: 0 auto;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .logo {
            font-weight: 700;
            font-size: 0.85rem;
            letter-spacing: 4px;
            color: var(--accent-emerald);
            font-family: 'Fira Code', monospace;
            text-shadow: 0 0 15px rgba(16, 185, 129, 0.4);
        }

        .status-badge {
            background: var(--accent-emerald-dim);
            color: var(--accent-emerald);
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 0.6rem;
            font-weight: 700;
            border: 1px solid rgba(16, 185, 129, 0.2);
            text-transform: uppercase;
        }

        /* Navigation Tabs */
        .nav-tabs {
            display: flex;
            background: var(--card-bg);
            backdrop-filter: var(--glass-blur);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            margin-bottom: 20px;
            padding: 4px;
        }

        .tab-btn {
            flex: 1;
            padding: 10px 4px;
            border: none;
            background: transparent;
            color: var(--text-dim);
            font-size: 0.65rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border-radius: 8px;
        }

        .tab-btn.active {
            color: var(--accent-emerald);
            background: rgba(16, 185, 129, 0.12);
        }

        .tab-content {
            display: none;
            animation: fadeIn 0.4s ease;
        }

        .tab-content.active {
            display: block;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(8px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .glass-card {
            background: var(--card-bg);
            backdrop-filter: var(--glass-blur);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
            margin-bottom: 16px;
        }

        .price-card {
            padding: 24px;
            text-align: center;
        }

        .price-label {
            color: var(--text-dim);
            font-size: 0.65rem;
            margin-bottom: 8px;
            letter-spacing: 2px;
            text-transform: uppercase;
            font-weight: 600;
        }

        .price-value {
            font-size: 3.2rem;
            font-weight: 700;
            margin-bottom: 4px;
            font-family: 'Fira Code', monospace;
            color: var(--text-main);
            letter-spacing: -3px;
        }

        .price-change {
            font-size: 0.9rem;
            font-weight: 600;
            font-family: 'Fira Code', monospace;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 16px;
        }

        .stat-card {
            padding: 16px;
        }

        .stat-label {
            color: var(--text-dim);
            font-size: 0.6rem;
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 1.2px;
            font-weight: 600;
        }

        .stat-value {
            font-weight: 700;
            font-size: 0.95rem;
            font-family: 'Fira Code', monospace;
        }

        #chart-container {
            width: 100%;
            height: 220px;
            margin-bottom: 16px;
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid var(--border-color);
        }

        /* Signal/Alert List */
        .signal-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .card-inner {
            padding: 16px;
        }

        .signal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .signal-type {
            font-weight: 700;
            font-family: 'Fira Code', monospace;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.6rem;
            text-transform: uppercase;
        }

        .type-buy {
            background: rgba(16, 185, 129, 0.2);
            color: #10b981;
        }

        .type-sell {
            background: rgba(239, 68, 68, 0.2);
            color: #ef4444;
        }

        .signal-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 8px;
        }

        .box label {
            display: block;
            font-size: 0.5rem;
            color: var(--text-dim);
            text-transform: uppercase;
            margin-bottom: 2px;
        }

        .box span {
            font-family: 'Fira Code', monospace;
            font-size: 0.8rem;
            font-weight: 600;
        }

        /* Analysis Table */
        .ta-row {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            font-size: 0.75rem;
        }

        .ta-row:last-child {
            border-bottom: none;
        }

        .ta-label {
            color: var(--text-dim);
        }

        .ta-value {
            font-family: 'Fira Code', monospace;
            font-weight: 600;
        }

        .action-button {
            background: var(--accent-emerald);
            color: #064e3b;
            border: none;
            width: 100%;
            padding: 16px;
            border-radius: 12px;
            font-weight: 700;
            font-size: 0.85rem;
            margin-top: 10px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 2px;
            box-shadow: 0 4px 15px rgba(16, 185, 129, 0.2);
        }

        .secondary-button {
            background: rgba(255, 255, 255, 0.03);
            color: var(--text-dim);
            border: 1px solid var(--border-color);
            width: 100%;
            padding: 12px;
            border-radius: 12px;
            font-weight: 600;
            font-size: 0.75rem;
            margin-top: 10px;
            cursor: pointer;
            text-transform: uppercase;
        }

        .empty-state {
            text-align: center;
            color: var(--text-dim);
            padding: 40px 20px;
            font-size: 0.75rem;
        }
    </style>
</head>

<body>
    <div class="container">
        <header>
            <div class="logo">EURO/SC_ZENITH</div>
            <div class="status-badge" id="api-status">CONNECTING</div>
        </header>

        <nav class="nav-tabs">
            <button class="tab-btn active" id="btn-live" onclick="showTab('live')">Terminal</button>
            <button class="tab-btn" id="btn-signals" onclick="showTab('signals')">Signals</button>
            <button class="tab-btn" id="btn-analysis" onclick="showTab('analysis')">Analysis</button>
            <button class="tab-btn" id="btn-alerts" onclick="showTab('alerts')">Alerts</button>
        </nav>

        <!-- LIVE TAB -->
        <div id="live" class="tab-content active">
            <div class="glass-card price-card">
                <div class="price-label">EUR/USD PRO QUOTE</div>
                <div class="price-value" id="price">-.-----</div>
                <div class="price-change" id="change">--.--- (---%)</div>
            </div>

            <div class="stats-grid">
                <div class="glass-card stat-card">
                    <div class="stat-label">Daily Reach</div>
                    <div class="stat-value" id="range">--- pips</div>
                </div>
                <div class="glass-card stat-card">
                    <div class="stat-label">Hi/Lo Range</div>
                    <div class="stat-value" id="hilo" style="font-size: 0.7rem;">-.--- / -.---</div>
                </div>
            </div>

            <div id="chart-container"></div>
        </div>

        <!-- SIGNALS TAB -->
        <div id="signals" class="tab-content">
            <div class="signal-list" id="signal-list">
                <div class="empty-state">SYNCING MARKET DATA...</div>
            </div>
        </div>

        <!-- ANALYSIS TAB -->
        <div id="analysis" class="tab-content">
            <div class="glass-card">
                <div class="card-inner" id="analysis-content">
                    <div class="empty-state">RUNNING NEURAL ANALYSIS...</div>
                </div>
            </div>
        </div>

        <!-- ALERTS TAB -->
        <div id="alerts" class="tab-content">
            <div class="signal-list" id="alert-list">
                <div class="empty-state">MONITORING PRICE LEVELS...</div>
            </div>
        </div>

        <button class="action-button" onclick="refreshData()" id="refresh-btn">REFRESH SYSTEM</button>
        <button class="secondary-button" onclick="Telegram.WebApp.close()">DISCONNECT</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.headerColor = '#0b0f19';
        tg.backgroundColor = '#0b0f19';

        const API_BASE = "/api";
        let chart, candleSeries;

        function initChart() {
            const container = document.getElementById('chart-container');
            chart = LightweightCharts.createChart(container, {
                layout: {
                    backgroundColor: 'transparent',
                    textColor: '#9ca3af',
                    fontSize: 10,
                },
                grid: {
                    vertLines: { color: 'rgba(31, 41, 55, 0.5)' },
                    horzLines: { color: 'rgba(31, 41, 55, 0.5)' },
                },
                crosshair: { mode: LightweightCharts.CrosshairMode.Normal },
                rightPriceScale: { borderColor: 'rgba(31, 41, 55, 0.5)' },
                timeScale: { borderColor: 'rgba(31, 41, 55, 0.5)', timeVisible: true },
            });
            candleSeries = chart.addCandlestickSeries({
                upColor: '#10b981',
                downColor: '#ef4444',
                borderVisible: false,
                wickUpColor: '#10b981',
                wickDownColor: '#ef4444',
            });

            new ResizeObserver(entries => {
                if (entries.length === 0 || !entries[0].contentRect) return;
                const { width, height } = entries[0].contentRect;
                chart.applyOptions({ width, height });
            }).observe(container);
        }

        async function fetchAPI(endpoint) {
            try {
                const response = await fetch(`${API_BASE}${endpoint}`);
                if (!response.ok) throw new Error("Network offline");
                return await response.json();
            } catch (e) {
                console.error("API Error:", e);
                return { success: false };
            }
        }

        function showTab(id) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.getElementById('btn-' + id).classList.add('active');
            tg.HapticFeedback.impactOccurred('light');

            if (id === 'live' && chart) {
                // Resize chart to fix rendering issues inside hidden tabs
                chart.timeScale().fitContent();
            }
            refreshData();
        }

        async function refreshData() {
            const activeTab = document.querySelector('.tab-content.active').id;
            const status = document.getElementById('api-status');

            if (activeTab === 'live') {
                const [summary, candles] = await Promise.all([
                    fetchAPI('/summary'),
                    fetchAPI('/candles?timeframe=H1')
                ]);

                if (summary.success) {
                    document.getElementById('price').innerText = summary.price.toFixed(5);
                    const sign = summary.change >= 0 ? '+' : '';
                    const changeEl = document.getElementById('change');
                    changeEl.innerText = `${sign}${summary.change.toFixed(5)} (${sign}${summary.change_pct.toFixed(2)}%)`;
                    changeEl.style.color = summary.change >= 0 ? 'var(--up-color)' : 'var(--down-color)';

                    document.getElementById('range').innerText = `${summary.range_pips.toFixed(1)} pips`;
                    document.getElementById('hilo').innerText = `${summary.high.toFixed(5)} / ${summary.low.toFixed(5)}`;

                    status.innerText = "● LIVE";
                    status.style.color = "var(--up-color)";
                } else {
                    status.innerText = "OFFLINE";
                    status.style.color = "var(--down-color)";
                }

                if (candles.success && candles.candles.length > 0) {
                    candleSeries.setData(candles.candles);
                    chart.timeScale().fitContent();
                }
            } else if (activeTab === 'signals') {
                const data = await fetchAPI('/signals');
                const list = document.getElementById('signal-list');
                if (data.success && data.signals.length > 0) {
                    list.innerHTML = data.signals.map(s => `
                        <div class="glass-card">
                            <div class="card-inner">
                                <div class="signal-header">
                                    <span class="signal-type type-${s.direction.toLowerCase()}">${s.direction.toUpperCase()}</span>
                                    <span style="font-size: 0.6rem; color: var(--text-dim);">${new Date(s.created_at).toLocaleTimeString()}</span>
                                </div>
                                <div class="signal-grid">
                                    <div class="box"><label>Entry</label><span>${s.entry_price.toFixed(5)}</span></div>
                                    <div class="box"><label>SL</label><span style="color: var(--down-color)">${s.stop_loss.toFixed(5)}</span></div>
                                    <div class="box"><label>TP</label><span style="color: var(--up-color)">${s.take_profit.toFixed(5)}</span></div>
                                </div>
                            </div>
                        </div>
                    `).join('');
                } else {
                    list.innerHTML = `<div class="empty-state">NO RECENT SIGNALS RECORDED</div>`;
                }
            } else if (activeTab === 'analysis') {
                const data = await fetchAPI('/analysis');
                const content = document.getElementById('analysis-content');
                if (data.success && data.data) {
                    const ta = data.data;
                    content.innerHTML = `
                        <p style="font-size: 0.7rem; font-weight: 700; color: var(--accent-emerald); margin-bottom: 12px; letter-spacing: 1px;">TECHNICAL INDICATORS (H1)</p>
                        <div class="ta-row"><span class="ta-label">Trend Direction</span><span class="ta-value">${ta.trend || 'N/A'}</span></div>
                        <div class="ta-row"><span class="ta-label">RSI (14)</span><span class="ta-value">${ta.indicators?.rsi?.toFixed(2) || 'N/A'}</span></div>
                        <div class="ta-row"><span class="ta-label">EMA 50</span><span class="ta-value">${ta.indicators?.ema_50?.toFixed(5) || 'N/A'}</span></div>
                        <div class="ta-row"><span class="ta-label">EMA 200</span><span class="ta-value">${ta.indicators?.ema_200?.toFixed(5) || 'N/A'}</span></div>
                        <div class="ta-row"><span class="ta-label">Volatility (ATR)</span><span class="ta-value">${(ta.indicators?.atr * 10000)?.toFixed(1) || '0.0'} pips</span></div>
                    `;
                } else {
                    content.innerHTML = `<div class="empty-state">ANALYSIS ENGINE UNAVAILABLE</div>`;
                }
            } else if (activeTab === 'alerts') {
                const data = await fetchAPI('/alerts');
                const list = document.getElementById('alert-list');
                if (data.success && data.alerts.length > 0) {
                    list.innerHTML = data.alerts.map(a => `
                        <div class="glass-card">
                            <div class="card-inner" style="display: flex; justify-content: space-between; align-items: center;">
                                <div>
                                    <label style="font-size: 0.5rem; color: var(--text-dim); text-transform: uppercase;">Condition Active</label>
                                    <p style="font-family: 'Fira Code', monospace; font-size: 0.85rem; font-weight: 600;">Price ${a.condition} ${a.target_value.toFixed(5)}</p>
                                </div>
                                <div style="height: 6px; width: 6px; background: var(--accent-emerald); border-radius: 50%;"></div>
                            </div>
                        </div>
                    `).join('');
                } else {
                    list.innerHTML = `<div class="empty-state">NO PRICE TARGETS CURRENTLY MONITORED</div>`;
                }
            }
        }

        window.onload = () => {
            initChart();
            refreshData();
        };

        // Pulsing background refresh for live data only
        setInterval(() => {
            if (document.querySelector('.tab-content.active').id === 'live') {
                refreshData();
            }
        }, 30000);
    </script>
</body>

</html>
