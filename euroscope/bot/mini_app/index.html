<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>EuroScope Zenith Dashboard</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Fira+Code:wght@400;600&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg-color: #111827;
            /* Zinc-900 */
            --card-bg: #1f2937;
            /* Zinc-800 */
            --accent-emerald: #10b981;
            /* Emerald-500 */
            --accent-emerald-dim: rgba(16, 185, 129, 0.1);
            --text-main: #e5e7eb;
            /* Zinc-200 */
            --text-dim: #9ca3af;
            /* Zinc-400 */
            --border-color: #374151;
            /* Zinc-700 */
            --up-color: #10b981;
            --down-color: #ef4444;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            overflow-x: hidden;
            padding: 16px;
            padding-bottom: 80px;
        }

        .container {
            max-width: 500px;
            margin: 0 auto;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }

        .logo {
            font-weight: 700;
            font-size: 1rem;
            letter-spacing: 2px;
            color: var(--accent-emerald);
            font-family: 'Fira Code', monospace;
        }

        .status-badge {
            background: var(--accent-emerald-dim);
            color: var(--accent-emerald);
            padding: 4px 12px;
            border-radius: 6px;
            font-size: 0.7rem;
            font-weight: 600;
            border: 1px solid rgba(16, 185, 129, 0.2);
            text-transform: uppercase;
        }

        /* Navigation Tabs */
        .nav-tabs {
            display: flex;
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            margin-bottom: 20px;
            overflow: hidden;
        }

        .tab-btn {
            flex: 1;
            padding: 12px;
            border: none;
            background: transparent;
            color: var(--text-dim);
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .tab-btn.active {
            color: var(--accent-emerald);
            background: rgba(16, 185, 129, 0.05);
        }

        .tab-content {
            display: none;
            animation: fadeIn 0.3s ease;
        }

        .tab-content.active {
            display: block;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(5px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .price-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 32px 24px;
            margin-bottom: 16px;
            text-align: center;
        }

        .price-label {
            color: var(--text-dim);
            font-size: 0.75rem;
            margin-bottom: 12px;
            letter-spacing: 1.5px;
            text-transform: uppercase;
        }

        .price-value {
            font-size: 2.8rem;
            font-weight: 700;
            margin-bottom: 8px;
            font-family: 'Fira Code', monospace;
            color: var(--text-main);
        }

        .price-change {
            font-size: 0.95rem;
            font-weight: 500;
            font-family: 'Fira Code', monospace;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 16px;
        }

        .stat-card {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 16px;
            border: 1px solid var(--border-color);
        }

        .stat-label {
            color: var(--text-dim);
            font-size: 0.7rem;
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .stat-value {
            font-weight: 600;
            font-size: 1.1rem;
            font-family: 'Fira Code', monospace;
        }

        .chart-placeholder {
            background: var(--bg-color);
            border-radius: 12px;
            height: 180px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 24px;
            border: 1px dashed var(--border-color);
            position: relative;
        }

        /* Signal Cards */
        .signal-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .signal-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 16px;
        }

        .signal-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 12px;
        }

        .signal-type {
            font-weight: 700;
            font-family: 'Fira Code', monospace;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.7rem;
        }

        .type-buy {
            background: rgba(16, 185, 129, 0.1);
            color: #10b981;
        }

        .type-sell {
            background: rgba(239, 68, 68, 0.1);
            color: #ef4444;
        }

        .signal-price-row {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 8px;
            text-align: center;
        }

        .price-box {
            display: flex;
            flex-direction: column;
        }

        .price-box label {
            font-size: 0.6rem;
            color: var(--text-dim);
            margin-bottom: 4px;
        }

        .price-box span {
            font-family: 'Fira Code', monospace;
            font-size: 0.8rem;
            font-weight: 600;
        }

        .action-button {
            background: var(--accent-emerald);
            color: #064e3b;
            border: none;
            width: 100%;
            padding: 18px;
            border-radius: 8px;
            font-weight: 700;
            font-size: 0.95rem;
            margin-bottom: 12px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .secondary-button {
            background: transparent;
            color: var(--text-dim);
            border: 1px solid var(--border-color);
            width: 100%;
            padding: 14px;
            border-radius: 8px;
            font-weight: 600;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s;
        }
    </style>
</head>

<body>
    <div class="container">
        <header>
            <div class="logo">EURO/SC_</div>
            <div class="status-badge" id="api-status">Connecting...</div>
        </header>

        <nav class="nav-tabs">
            <button class="tab-btn active" onclick="showTab('live')">Terminal</button>
            <button class="tab-btn" onclick="showTab('signals')">Signals</button>
            <button class="tab-btn" onclick="showTab('alerts')">Alerts</button>
        </nav>

        <!-- LIVE TAB -->
        <div id="live" class="tab-content active">
            <div class="price-card">
                <div class="price-label">EUR/USD PRO PRICE</div>
                <div class="price-value" id="price">-.-----</div>
                <div class="price-change" id="change">--.--- (---%)</div>
            </div>

            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-label">DAILY RANGE</div>
                    <div class="stat-value" id="range">--- pips</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">SENTIMENT</div>
                    <div class="stat-value" id="sentiment">NEUTRAL</div>
                </div>
            </div>

            <div class="chart-placeholder">
                <span style="color: var(--text-dim); font-size: 0.8rem; z-index: 1;">REAL-TIME TICKER ACTIVE</span>
            </div>
        </div>

        <!-- SIGNALS TAB -->
        <div id="signals" class="tab-content">
            <div class="signal-list" id="signal-list">
                <div style="text-align: center; color: var(--text-dim); padding: 40px;">SCANNING FOR SIGNALS...</div>
            </div>
        </div>

        <!-- ALERTS TAB -->
        <div id="alerts" class="tab-content">
            <div class="signal-list" id="alert-list">
                <div style="text-align: center; color: var(--text-dim); padding: 40px;">MONITORING PRICE LEVELS...</div>
            </div>
        </div>

        <button class="action-button" onclick="refreshData()" id="refresh-btn">REFRESH SYSTEM</button>
        <button class="secondary-button" onclick="Telegram.WebApp.close()">CLOSE TERMINAL</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.enableClosingConfirmation();

        // API Configuration - Set YOUR_VPS_IP in your .env or replace here
        const API_BASE = "/api";

        async function fetchAPI(endpoint) {
            try {
                const response = await fetch(`${API_BASE}${endpoint}`);
                return await response.json();
            } catch (e) {
                console.error("API Error:", e);
                return null;
            }
        }

        function showTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            event.target.classList.add('active');
            tg.HapticFeedback.impactOccurred('light');
            refreshData();
        }

        async function refreshData() {
            const refreshBtn = document.getElementById('refresh-btn');
            refreshBtn.innerText = "REFRESHING...";

            const activeTab = document.querySelector('.tab-content.active').id;

            if (activeTab === 'live') {
                const data = await fetchAPI('/summary');
                if (data && data.success) {
                    document.getElementById('price').innerText = data.price.toFixed(5);
                    const changeEl = document.getElementById('change');
                    const sign = data.change >= 0 ? '+' : '';
                    changeEl.innerText = `${sign}${data.change.toFixed(5)} (${sign}${data.change_pct.toFixed(2)}%)`;
                    changeEl.style.color = data.change >= 0 ? 'var(--up-color)' : 'var(--down-color)';

                    const sentEl = document.getElementById('sentiment');
                    sentEl.innerText = data.sentiment.toUpperCase();
                    sentEl.style.color = data.sentiment === 'bullish' ? 'var(--up-color)' : 'var(--down-color)';

                    document.getElementById('api-status').innerText = "● LIVE";
                    document.getElementById('api-status').style.color = "var(--up-color)";
                }
            } else if (activeTab === 'signals') {
                const data = await fetchAPI('/signals');
                const list = document.getElementById('signal-list');
                if (data && data.success && data.signals.length > 0) {
                    list.innerHTML = data.signals.map(s => `
                        <div class="signal-card">
                            <div class="signal-header">
                                <span class="signal-type type-${s.direction.toLowerCase()}">${s.direction.toUpperCase()}</span>
                                <span style="font-size: 0.6rem; color: var(--text-dim);">${s.created_at.split('T')[1].split('.')[0]}</span>
                            </div>
                            <div class="signal-price-row">
                                <div class="price-box"><label>ENTRY</label><span>${s.entry_price.toFixed(5)}</span></div>
                                <div class="price-box"><label>SL</label><span style="color: var(--down-color)">${s.stop_loss.toFixed(5)}</span></div>
                                <div class="price-box"><label>TP</label><span style="color: var(--up-color)">${s.take_profit.toFixed(5)}</span></div>
                            </div>
                        </div>
                    `).join('');
                }
            } else if (activeTab === 'alerts') {
                const data = await fetchAPI('/alerts');
                const list = document.getElementById('alert-list');
                if (data && data.success && data.alerts.length > 0) {
                    list.innerHTML = data.alerts.map(a => `
                        <div class="signal-card">
                            <div class="signal-header">
                                <span style="font-weight: 600; font-size: 0.8rem;">${a.condition.toUpperCase()} ${a.target_value.toFixed(5)}</span>
                                <span style="font-size: 0.6rem; color: var(--text-dim);">ACTIVE</span>
                            </div>
                        </div>
                    `).join('');
                }
            }

            refreshBtn.innerText = "REFRESH SYSTEM";
            tg.HapticFeedback.notificationOccurred('success');
        }

        // Auto-refresh every 30 seconds
        setInterval(() => {
            if (document.querySelector('.tab-content.active').id === 'live') {
                refreshData();
            }
        }, 30000);

        refreshData();
    </script>
</body>

</html>
