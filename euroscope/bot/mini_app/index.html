<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Zenith Terminal v3</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Fira+Code:wght@400;600&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg-color: #0d0f14;
            --surface-color: #161a23;
            --accent-primary: #10b981;
            --accent-primary-dim: rgba(16, 185, 129, 0.1);
            --text-main: #f9fafb;
            --text-muted: #9ca3af;
            --text-dim: #6b7280;
            --border-color: #232936;
            --up-color: #10b981;
            --down-color: #ef4444;
            --glass-blur: blur(24px);
            --safe-bottom: env(safe-area-inset-bottom, 0px);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            font-feature-settings: "tnum";
            font-variant-numeric: tabular-nums;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            overflow-x: hidden;
            padding: 16px;
            padding-bottom: calc(20px + var(--safe-bottom));
            min-height: 100vh;
        }

        /* Animations */
        @keyframes pulse {
            0% {
                opacity: 0.4;
            }

            50% {
                opacity: 0.8;
            }

            100% {
                opacity: 0.4;
            }
        }

        @keyframes slideUp {
            from {
                transform: translateY(12px);
                opacity: 0;
            }

            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .skeleton {
            background: var(--surface-color);
            border-radius: 8px;
            animation: pulse 1.5s infinite ease-in-out;
            height: 20px;
            width: 100%;
        }

        .container {
            max-width: 480px;
            margin: 0 auto;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .logo {
            font-weight: 700;
            font-size: 0.75rem;
            letter-spacing: 4px;
            color: var(--accent-primary);
            font-family: 'Fira Code', monospace;
            text-transform: uppercase;
        }

        .market-badge {
            font-size: 0.55rem;
            padding: 4px 10px;
            border-radius: 20px;
            font-weight: 700;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            border: 1px solid currentColor;
            opacity: 0.9;
        }

        .status-open {
            color: var(--up-color);
            background: rgba(16, 185, 129, 0.1);
        }

        .status-closed {
            color: var(--text-muted);
            background: rgba(156, 163, 175, 0.1);
        }

        /* Navigation */
        .nav-scroller {
            overflow-x: auto;
            scrollbar-width: none;
            margin: 0 -16px 20px -16px;
            padding: 0 16px;
        }

        .nav-scroller::-webkit-scrollbar {
            display: none;
        }

        .nav-tabs {
            display: flex;
            background: var(--surface-color);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 4px;
            width: max-content;
            min-width: 100%;
        }

        .tab-btn {
            padding: 10px 16px;
            border: none;
            background: transparent;
            color: var(--text-muted);
            font-size: 0.65rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            border-radius: 8px;
            transition: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .tab-btn.active {
            color: var(--accent-primary);
            background: rgba(16, 185, 129, 0.12);
        }

        .tab-content {
            display: none;
            animation: slideUp 0.4s ease-out;
        }

        .tab-content.active {
            display: block;
        }

        /* Cards */
        .card {
            background: var(--surface-color);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            padding: 24px;
            margin-bottom: ١٦px;
        }

        .hero-price {
            text-align: center;
            padding: 32px 20px;
        }

        .hero-price .label {
            color: var(--text-muted);
            font-size: 0.65rem;
            letter-spacing: 3px;
            margin-bottom: 12px;
            font-weight: 600;
        }

        .hero-price .value {
            font-size: 3.8rem;
            font-weight: 700;
            font-family: 'Fira Code', monospace;
            letter-spacing: -3px;
            margin-bottom: 4px;
        }

        .hero-price .change {
            font-size: 1rem;
            font-weight: 600;
            font-family: 'Fira Code', monospace;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 16px;
        }

        .small-card {
            padding: 16px;
            border-radius: 20px;
        }

        .small-card .label {
            font-size: 0.55rem;
            color: var(--text-dim);
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 600;
        }

        .small-card .value {
            font-size: 0.95rem;
            font-weight: 700;
            font-family: 'Fira Code', monospace;
        }

        /* Chart Controls */
        #chart-wrap {
            position: relative;
            width: 100%;
            border-radius: 24px;
            overflow: hidden;
            border: 1px solid var(--border-color);
            background: #0b0f14;
            margin-bottom: 16px;
        }

        #chart-container {
            width: 100%;
            height: 260px;
        }

        .chart-tf-picker {
            position: absolute;
            top: 12px;
            right: 12px;
            display: flex;
            gap: 4px;
            z-index: 10;
            background: rgba(13, 15, 20, 0.6);
            backdrop-filter: blur(8px);
            padding: 2px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
        }

        .tf-btn {
            background: transparent;
            border: none;
            color: var(--text-dim);
            font-size: 0.6rem;
            padding: 4px 8px;
            border-radius: 6px;
            font-weight: 700;
            cursor: pointer;
        }

        .tf-btn.active {
            color: var(--accent-primary);
            background: rgba(16, 185, 129, 0.15);
        }

        /* Detail List */
        .info-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.03);
        }

        .info-row:last-child {
            border-bottom: none;
        }

        .info-row .label {
            font-size: 0.75rem;
            color: var(--text-muted);
        }

        .info-row .val {
            font-size: 0.8rem;
            font-weight: 600;
            font-family: 'Fira Code', monospace;
        }

        /* Buttons */
        .primary-btn {
            background: var(--accent-primary);
            color: #0d121b;
            width: 100%;
            border: none;
            padding: 18px;
            border-radius: 16px;
            font-weight: 700;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-top: 12px;
            box-shadow: 0 8px 24px rgba(16, 185, 129, 0.2);
        }

        .secondary-btn {
            background: transparent;
            color: var(--text-muted);
            width: 100%;
            border: 1px solid var(--border-color);
            padding: 14px;
            border-radius: 16px;
            font-weight: 600;
            font-size: 0.75rem;
            margin-top: 12px;
            text-transform: uppercase;
        }
    </style>
</head>

<body>
    <div class="container">
        <header>
            <div class="brand">
                <div class="logo">ZENITH/V3</div>
            </div>
            <div id="mkt-status" class="market-badge status-closed">SYNCING</div>
        </header>

        <div class="nav-scroller">
            <nav class="nav-tabs">
                <button class="tab-btn active" id="tab-terminal" onclick="switchTab('terminal')">Terminal</button>
                <button class="tab-btn" id="tab-signals" onclick="switchTab('signals')">Signals</button>
                <button class="tab-btn" id="tab-analysis" onclick="switchTab('analysis')">Analysis</button>
                <button class="tab-btn" id="tab-alerts" onclick="switchTab('alerts')">Alerts</button>
            </nav>
        </div>

        <!-- TERMINAL TAB -->
        <div id="terminal-view" class="tab-content active">
            <div class="card hero-price">
                <div class="label">EUR/USD INSTITUTIONAL FEED</div>
                <div id="price" class="value">-.-----</div>
                <div id="price-change" class="change">--.--- (---%)</div>
            </div>

            <div class="stats-grid">
                <div class="card small-card">
                    <div class="label">Vol. Range</div>
                    <div id="stat-range" class="value">--- pips</div>
                </div>
                <div class="card small-card">
                    <div class="label">Day Low/High</div>
                    <div id="stat-hilo" class="value" style="font-size: 0.75rem;">-.--- / -.---</div>
                </div>
            </div>

            <div id="chart-wrap">
                <div class="chart-tf-picker">
                    <button class="tf-btn" onclick="updateTimeframe('M15')">M15</button>
                    <button class="tf-btn active" onclick="updateTimeframe('H1')">H1</button>
                    <button class="tf-btn" onclick="updateTimeframe('D1')">D1</button>
                </div>
                <div id="chart-container"></div>
            </div>
        </div>

        <!-- ANALYSIS TAB -->
        <div id="analysis-view" class="tab-content">
            <div class="card">
                <h3
                    style="font-size: 0.65rem; color: var(--accent-primary); letter-spacing: 2px; margin-bottom: 20px; text-transform: uppercase;">
                    Technical DNA (H1)</h3>
                <div id="node-analysis">
                    <div class="skeleton" style="margin-bottom: 12px;"></div>
                    <div class="skeleton" style="margin-bottom: 12px; width: 80%;"></div>
                    <div class="skeleton" style="width: 60%;"></div>
                </div>
            </div>
        </div>

        <!-- SIGNALS TAB -->
        <div id="signals-view" class="tab-content">
            <div id="signal-list">
                <div class="empty-state"
                    style="text-align: center; padding: 40px; color: var(--text-dim); font-size: 0.8rem;">SYNCING
                    SIGNALS...</div>
            </div>
        </div>

        <!-- ALERTS TAB -->
        <div id="alerts-view" class="tab-content">
            <div id="alert-list">
                <div class="empty-state"
                    style="text-align: center; padding: 40px; color: var(--text-dim); font-size: 0.8rem;">MONITORING
                    LEVELS...</div>
            </div>
        </div>

        <button class="primary-btn" onclick="manualSync()">REFRESH ENGINE</button>
        <button class="secondary-btn" onclick="Telegram.WebApp.close()">EXIT INTERFACE</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.headerColor = '#0d0f14';
        tg.backgroundColor = '#0d0f14';

        const API_BASE = "/api";
        let chart, candleSeries;
        let currentTF = 'H1';
        let refreshTimer;

        // Initialize Chart
        function initChart() {
            const container = document.getElementById('chart-container');
            chart = LightweightCharts.createChart(container, {
                layout: {
                    background: { type: 'solid', color: '#0d0f14' },
                    textColor: '#6b7280',
                    fontSize: 10,
                },
                grid: {
                    vertLines: { color: '#1a1e27' },
                    horzLines: { color: '#1a1e27' },
                },
                rightPriceScale: { borderColor: '#232936', scaleMargins: { top: 0.3, bottom: 0.2 } },
                timeScale: { borderColor: '#232936', timeVisible: true },
                crosshair: { mode: LightweightCharts.CrosshairMode.Normal },
            });
            candleSeries = chart.addCandlestickSeries({
                upColor: '#10b981',
                downColor: '#ef4444',
                borderVisible: false,
                wickUpColor: '#10b981',
                wickDownColor: '#ef4444',
            });

            new ResizeObserver(() => {
                chart.applyOptions({ width: container.clientWidth, height: container.clientHeight });
            }).observe(container);
        }

        async function apiRequest(endpoint) {
            try {
                const res = await fetch(`${API_BASE}${endpoint}`);
                return await res.json();
            } catch (e) { return { success: false }; }
        }

        function switchTab(viewId) {
            document.querySelectorAll('.tab-content').forEach(v => v.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(viewId + '-view').classList.add('active');
            document.getElementById('tab-' + viewId).classList.add('active');
            tg.HapticFeedback.impactOccurred('light');
            sync(viewId);
        }

        async function updateTimeframe(tf) {
            currentTF = tf;
            document.querySelectorAll('.tf-btn').forEach(b => {
                b.classList.toggle('active', b.textContent === tf);
            });
            tg.HapticFeedback.selectionChanged();
            const data = await apiRequest(`/candles?timeframe=${tf}`);
            if (data.success && data.candles) {
                candleSeries.setData(data.candles);
                chart.timeScale().fitContent();
            }
        }

        async function sync(activeTab = null) {
            if (!activeTab) activeTab = document.querySelector('.tab-content.active').id.replace('-view', '');

            // Global Status
            const [summary, status] = await Promise.all([apiRequest('/summary'), apiRequest('/status')]);

            if (status.success && status.data) {
                const s = status.data;
                const el = document.getElementById('mkt-status');
                el.textContent = s.status;
                el.className = `market-badge status-${s.status.toLowerCase()}`;
            }

            if (summary.success) {
                document.getElementById('price').textContent = summary.price.toFixed(5);
                const chg = summary.change || 0;
                const sign = chg >= 0 ? '+' : '';
                const changeEl = document.getElementById('price-change');
                changeEl.textContent = `${sign}${chg.toFixed(5)} (${sign}${summary.change_pct.toFixed(2)}%)`;
                changeEl.style.color = chg >= 0 ? 'var(--up-color)' : 'var(--down-color)';

                document.getElementById('stat-range').textContent = `${(summary.range_pips || 0).toFixed(1)} pips`;
                document.getElementById('stat-hilo').textContent = `${(summary.low || 0).toFixed(5)} / ${(summary.high || 0).toFixed(5)}`;
            }

            if (activeTab === 'terminal') {
                const data = await apiRequest(`/candles?timeframe=${currentTF}`);
                if (data.success && data.candles) {
                    candleSeries.setData(data.candles);
                    chart.timeScale().fitContent();
                }
            } else if (activeTab === 'analysis') {
                const res = await apiRequest('/analysis');
                const box = document.getElementById('node-analysis');
                if (res.success && res.data) {
                    const ta = res.data;
                    const ind = ta.indicators || {};
                    box.innerHTML = `
                        <div class="info-row"><span class="label">Network Bias</span><span class="val" style="color:var(--accent-primary)">${ta.overall_bias?.toUpperCase() || 'NEUTRAL'}</span></div>
                        <div class="info-row"><span class="label">RSI (14)</span><span class="val">${ind.RSI?.value?.toFixed(2) || '---'}</span></div>
                        <div class="info-row"><span class="label">ATR Volatility</span><span class="val">${ind.ATR?.pips?.toFixed(1) || '0.0'} pips</span></div>
                        <div class="info-row"><span class="label">EMA 50 (Trend)</span><span class="val">${ind.EMA?.ema50?.toFixed(5) || '---'}</span></div>
                        <div class="info-row"><span class="label">EMA 200 (Bass)</span><span class="val">${ind.EMA?.ema200?.toFixed(5) || '---'}</span></div>
                    `;
                }
            } else if (activeTab === 'signals') {
                const res = await apiRequest('/signals');
                const list = document.getElementById('signal-list');
                if (res.success && res.signals?.length > 0) {
                    list.innerHTML = res.signals.map(s => `
                        <div class="card" style="padding: 16px; margin-bottom: 12px; border-radius: 12px;">
                            <div style="display:flex; justify-content:space-between; margin-bottom:12px;">
                                <span style="font-weight:700; color: ${s.direction === 'BUY' ? 'var(--up-color)' : 'var(--down-color)'}; font-size: 0.7rem;">${s.direction} SIGNAL</span>
                                <span style="font-size: 0.6rem; color: var(--text-dim);">${new Date(s.timestamp || s.created_at).toLocaleTimeString()}</span>
                            </div>
                            <div style="display:grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; text-align:center;">
                                <div><small style="display:block; font-size:0.5rem; color:var(--text-dim); text-transform:uppercase;">Entry</small><b style="font-family:'Fira Code'; font-size:0.75rem;">${s.entry_price.toFixed(5)}</b></div>
                                <div><small style="display:block; font-size:0.5rem; color:var(--text-dim); text-transform:uppercase;">Stop</small><b style="font-family:'Fira Code'; font-size:0.75rem; color:var(--down-color)">${s.stop_loss.toFixed(5)}</b></div>
                                <div><small style="display:block; font-size:0.5rem; color:var(--text-dim); text-transform:uppercase;">Target</small><b style="font-family:'Fira Code'; font-size:0.75rem; color:var(--up-color)">${s.take_profit.toFixed(5)}</b></div>
                            </div>
                        </div>
                    `).join('');
                } else {
                    list.innerHTML = `<div class="empty-state">NO RECENT TRADE CLASSIFICATIONS</div>`;
                }
            }
        }

        function manualSync() {
            tg.HapticFeedback.notificationOccurred('success');
            sync();
        }

        window.onload = () => {
            initChart();
            sync('terminal');
            setInterval(() => sync(), 10000); // 10s auto-refresh
        };
    </script>
</body>

</html>
